<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EventBooking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="navbar-wrapper">
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fa-solid fa-shapes"></i>
                EventBooking
            </div>
            <div class="nav-links">
                <a href="index.html" style="color: var(--primary-color); font-weight: 600;">Events</a>
                <a href="summary.html">My Bookings</a>
                <span id="userName"></span>
                <button onclick="logout()" class="btn btn-outline" style="padding: 0.35rem 0.85rem; font-size: 0.8rem; border-radius: 9999px;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                </button>
            </div>
        </nav>
    </div>

    <div class="container" style="padding-top: 2rem;">
        <div class="section-header">
            <div>
                <h1>Events Dashboard</h1>
                <p style="color: var(--text-secondary); margin-top: 0.25rem;">Browse and manage upcoming events</p>
            </div>
            <button id="createEventBtn" class="btn btn-primary pill">
                <i class="fa-solid fa-plus"></i>
                Create Event
            </button>
        </div>

        <div id="alert" class="alert"></div>

        <!-- Create Event Form -->
        <div id="createEventFormContainer" style="display: none; background: var(--surface-color); padding: 2rem; border-radius: var(--radius); border: 1px solid var(--border-color); margin-bottom: 2rem; box-shadow: var(--shadow-sm);">
            <h2>Add New Event</h2>
            <form id="eventForm" style="margin-top: 1.5rem;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Event Name</label>
                        <input type="text" id="eventName" class="form-control" required placeholder="e.g. Q3 Townhall">
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" id="eventDept" class="form-control" required placeholder="e.g. Engineering">
                    </div>
                    <div class="form-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" id="eventDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Venue</label>
                        <input type="text" id="eventVenue" class="form-control" required placeholder="e.g. Main Auditorium">
                    </div>
                    <div class="form-group">
                        <label>Ticket Price (₹)</label>
                        <input type="number" step="0.01" min="0" id="eventPrice" class="form-control" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Available Tickets</label>
                        <input type="number" min="1" id="eventTickets" class="form-control" required placeholder="100">
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem; justify-content: flex-end;">
                    <button type="button" id="cancelCreateBtn" class="btn btn-outline">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Save Event</button>
                </div>
            </form>
        </div>

        <div id="eventsGrid" class="grid">
            <p style="color: var(--text-secondary);">Loading events...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
