<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Event Tickets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <h2 style="text-align: center; color: var(--primary-color);">Create Account</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Join to start booking events</p>
        
        <div id="alert" class="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="user@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        </form>
        
        <p style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
            Already have an account? <a href="login.html">Log in</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
